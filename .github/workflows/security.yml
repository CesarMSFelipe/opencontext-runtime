name: security

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install packages for dependency audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          python -m pip install \
            -e packages/opencontext_core \
            -e packages/opencontext_profiles \
            -e packages/opencontext_memory \
            -e packages/opencontext_sdd \
            -e packages/opencontext_cli \
            -e packages/opencontext_api
      - name: Audit installed dependencies
        run: pip-audit
