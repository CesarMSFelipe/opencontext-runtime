name: Publish to PyPI

on:
  release:
    types: [published]
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish'
        required: true
        type: string

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # RELEASE_CONTRACT gate: no publish unless the installed product passes.
  # Runs the full release-acceptance workflow (DoD sequence, artifact hygiene
  # audit, fresh-venv install + acceptance against the installed wheels, and
  # uninstall-verify) on the same ref this run publishes.
  release-acceptance:
    uses: ./.github/workflows/release-acceptance.yml
    permissions:
      contents: read

  build-and-publish:
    needs: release-acceptance
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [opencontext-core, opencontext-cli, opencontext-api, opencontext-profiles, opencontext-memory, opencontext-sdd, opencontext-studio]
        include:
          - package: opencontext-core
            path: packages/opencontext_core
          - package: opencontext-cli
            path: packages/opencontext_cli
          - package: opencontext-api
            path: packages/opencontext_api
          - package: opencontext-profiles
            path: packages/opencontext_profiles
          - package: opencontext-memory
            path: packages/opencontext_memory
          - package: opencontext-sdd
            path: packages/opencontext_sdd
          - package: opencontext-studio
            path: packages/opencontext_studio

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build package
        run: |
          rm -rf ${{ matrix.path }}/dist/
          python -m build --wheel ${{ matrix.path }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ matrix.path }}/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
          print-hash: true
          # Idempotent: if a release partially published (some packages up, some
          # failed) and is re-run, don't fail on versions already on PyPI.
          skip-existing: true