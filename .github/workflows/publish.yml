name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [opencontext-core, opencontext-cli, opencontext-api, opencontext-profiles, opencontext-providers]
        include:
          - package: opencontext-core
            path: packages/opencontext_core
          - package: opencontext-cli
            path: packages/opencontext_cli
          - package: opencontext-api
            path: packages/opencontext_api
          - package: opencontext-profiles
            path: packages/opencontext_profiles
          - package: opencontext-providers
            path: packages/opencontext_providers

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build package
        run: python -m build ${{ matrix.path }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ matrix.path }}/dist/
          print-hash: true