name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install packages and validation tools
        run: |
          python -m pip install --upgrade pip
          # Pin the lint/type tools so a new ruff/mypy release can't spuriously
          # break CI with changed format rules or new checks (the repo is
          # formatted for this ruff). Bump deliberately.
          python -m pip install ruff==0.15.17 mypy==1.20.2 pytest build types-PyYAML types-requests
          python -m pip install -e packages/opencontext_core
          python -m pip install -e packages/opencontext_profiles
          python -m pip install -e packages/opencontext_providers
          python -m pip install -e packages/opencontext_cli
          python -m pip install -e packages/opencontext_api
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Type check core
        run: mypy packages/opencontext_core
      - name: Test
        run: pytest
      - name: Build distributions
        run: |
          python -m build packages/opencontext_core
          python -m build packages/opencontext_profiles
          python -m build packages/opencontext_providers
          python -m build packages/opencontext_cli
          python -m build packages/opencontext_api
