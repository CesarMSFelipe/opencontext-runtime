name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Linux mirrors the dev environment, so `make ci` reproduces it locally.
        # Windows is kept as a real cross-platform signal for Windows users; it is
        # continue-on-error for now (can't be reproduced on a Linux dev box) — flip
        # that off to make it a hard gate once it is confirmed green.
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    env:
      # Run Python in UTF-8 mode so the CLI's glyphs (↓ · — ✓) and the tests'
      # subprocess capture work on Windows, whose default code page (cp1252) can't
      # encode them. No-op on Linux (already UTF-8).
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install packages and validation tools
        run: |
          python -m pip install --upgrade pip
          # Pinned toolchain — single source of truth shared with `make ci` so
          # local and CI are identical and a dependency update can't break CI.
          python -m pip install -r requirements-ci.txt
          # Install every first-party dependency as editable BEFORE opencontext_cli:
          # cli requires opencontext-memory/opencontext-sdd, which are not on PyPI
          # until a release publishes them, so pip must resolve them locally.
          python -m pip install -e packages/opencontext_core
          python -m pip install -e packages/opencontext_profiles
          python -m pip install -e packages/opencontext_memory
          python -m pip install -e packages/opencontext_sdd
          python -m pip install -e packages/opencontext_cli
          python -m pip install -e packages/opencontext_api
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Type check (core + api + cli + profiles)
        run: mypy packages/opencontext_core packages/opencontext_api packages/opencontext_cli packages/opencontext_profiles
      - name: Test (unit lane, parallel)
        # Parallel unit lane across CPUs (pytest-xdist). Excludes the black-box
        # acceptance tests (run serially below) and the real_host end-to-end
        # tests. Per-worker HOME isolation in tests/conftest.py keeps parallel
        # workers from colliding on ~/.opencontext / ~/.engram.
        run: pytest -n auto --ignore=tests/acceptance -m "not real_host"
      - name: Test (acceptance lane, serial)
        # Acceptance tests drive the real CLI with isolated $HOME + temp
        # workspaces and long subprocess timeouts; kept serial on purpose.
        run: pytest tests/acceptance -m "not real_host"
      - name: Build distributions
        # Mirrors the publish.yml matrix so a packaging break in any published
        # package fails here, before a release is attempted.
        run: |
          python -m build packages/opencontext_core
          python -m build packages/opencontext_profiles
          python -m build packages/opencontext_memory
          python -m build packages/opencontext_sdd
          python -m build packages/opencontext_studio
          python -m build packages/opencontext_cli
          python -m build packages/opencontext_api

  acceptance-smoke:
    # Fast PR lane: the SMOKE-001..010 acceptance subset (black-box, real
    # binary) from ACCEPTANCE_CONTRACT.md. Runs on PRs only.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt
          python -m pip install -e packages/opencontext_core
          python -m pip install -e packages/opencontext_profiles
          python -m pip install -e packages/opencontext_memory
          python -m pip install -e packages/opencontext_sdd
          python -m pip install -e packages/opencontext_cli
          python -m pip install -e packages/opencontext_api
      - name: Acceptance smoke
        run: python -m pytest tests/acceptance -m smoke -q

  clean-install-acceptance:
    # Proves the product works the way a real user gets it: a FRESH venv install
    # from the packages (no editable, no PYTHONPATH) driven through the full
    # post-install journey. Catches missing package-data / broken entry points
    # that the source-tree test job cannot see. Runs on Linux only.
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Clean-install user journey
        run: bash scripts/clean_install_acceptance.sh
