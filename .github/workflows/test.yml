name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Linux only: it mirrors the dev environment, so `make ci` reproduces this
        # job byte-for-byte locally. A Windows runner can't be reproduced on a
        # Linux dev box (the "same conditions" goal), so it's intentionally out of
        # the gating matrix — re-add it only with a way to debug it locally.
        os: [ubuntu-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install packages and validation tools
        run: |
          python -m pip install --upgrade pip
          # Pinned toolchain — single source of truth shared with `make ci` so
          # local and CI are identical and a dependency update can't break CI.
          python -m pip install -r requirements-ci.txt
          python -m pip install -e packages/opencontext_core
          python -m pip install -e packages/opencontext_profiles
          python -m pip install -e packages/opencontext_providers
          python -m pip install -e packages/opencontext_cli
          python -m pip install -e packages/opencontext_api
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Type check core
        run: mypy packages/opencontext_core
      - name: Test
        run: pytest
      - name: Build distributions
        run: |
          python -m build packages/opencontext_core
          python -m build packages/opencontext_profiles
          python -m build packages/opencontext_providers
          python -m build packages/opencontext_cli
          python -m build packages/opencontext_api
