name: release-acceptance

# AVH-007 / AVH-010 / B3 / B4: the HARD 1.0 acceptance gate. Runs the Definition-of-Done
# command sequence over the golden fixture and then the doc-57 A/B/C/D acceptance verdict
# in RELEASE mode, where any NOT_MEASURED mandatory gate FAILS the workflow (build-rule #1:
# 1.0 cannot be declared on unproven evidence). Parity-gated flip bundles under
# .opencontext/flips/*.json are read by `release acceptance`, which verifies each flipped
# default's ACTIVE flag state matches its evidence bundle.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  acceptance:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt
          python -m pip install -e packages/opencontext_core
          python -m pip install -e packages/opencontext_profiles
          python -m pip install -e packages/opencontext_cli
          python -m pip install -e packages/opencontext_api
      - name: DoD sequence — install -> doctor -> index -> run -> pytest (golden)
        run: |
          opencontext install --yes tests/golden/oc_flow_bugfix_python
          opencontext doctor --strict
          opencontext index tests/golden/oc_flow_bugfix_python
          opencontext run "Fix failing test" --workflow auto \
            --root tests/golden/oc_flow_bugfix_python --json
          pytest tests/golden/oc_flow_bugfix_python -q --noconftest
      - name: B+D + e2e-dod evidence — run the real DoD journey, write evidence artifacts
        # VDM-006/007: writes .opencontext/e2e/dod-proof.json + release-evidence.json
        # at the repo root from a genuine journey; `release acceptance` reads them.
        run: python scripts/collect_release_evidence.py --root .
      - name: CI regression gates — write .opencontext/reports/ci-gates.json
        # VDM-006: the five externally-measured C gates. Each check's exit code (0=pass)
        # becomes a boolean the acceptance evaluator reads as MET/FAILED.
        run: |
          set +e
          python -m pytest -p no:randomly -q -o addopts= ; SUITE=$?
          bash scripts/gate_k.sh ; GATEK=$?
          mypy packages/ ; MYPY=$?
          ruff check packages/ ; RUFF=$?
          # The forbidden-names guard ships as pytest assertions over public surfaces.
          python -m pytest -p no:randomly -q -o addopts= \
            tests/core/test_config.py -k "external_names or generic_names" ; FORBID=$?
          set -e
          mkdir -p .opencontext/reports
          python - "$SUITE" "$GATEK" "$MYPY" "$RUFF" "$FORBID" <<'PY'
          import json, sys
          suite, gatek, mypy, ruff, forbid = (int(a) == 0 for a in sys.argv[1:6])
          gates = {
              "suite-green": suite,
              "gate-k-12-12": gatek,
              "mypy-strict-clean": mypy,
              "ruff-clean": ruff,
              "forbidden-names-clean": forbid,
          }
          with open(".opencontext/reports/ci-gates.json", "w", encoding="utf-8") as fh:
              json.dump(gates, fh, indent=2)
          print(json.dumps(gates, indent=2))
          PY
      - name: Release acceptance (RELEASE mode — NOT_MEASURED mandatory gate fails)
        run: opencontext release acceptance --root . --release
