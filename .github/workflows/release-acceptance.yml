name: release-acceptance

# AVH-007 / AVH-010 / B3 / B4: the HARD 1.0 acceptance gate. Runs the Definition-of-Done
# command sequence over the golden fixture and then the doc-57 A/B/C/D acceptance verdict
# in RELEASE mode, where any NOT_MEASURED mandatory gate FAILS the workflow (build-rule #1:
# 1.0 cannot be declared on unproven evidence). Parity-gated flip bundles under
# .opencontext/flips/*.json are read by `release acceptance`, which verifies each flipped
# default's ACTIVE flag state matches its evidence bundle.

on:
  release:
    types: [published]
  workflow_dispatch:
  # RELEASE_CONTRACT: publish.yml calls this workflow as its gate; the caller's
  # ref/sha is inherited, so acceptance runs on the exact tag being published.
  workflow_call:

permissions:
  contents: read

jobs:
  acceptance:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt
          # Install every first-party dependency as editable BEFORE opencontext_cli
          # so cli's opencontext-memory / opencontext-sdd deps resolve to the local
          # source, not stale published PyPI wheels (which lack e.g. mem_save(proposed=)
          # and the sdd-status currentPhase field, silently failing the suite).
          python -m pip install -e packages/opencontext_core
          python -m pip install -e packages/opencontext_profiles
          python -m pip install -e packages/opencontext_memory
          python -m pip install -e packages/opencontext_sdd
          python -m pip install -e packages/opencontext_cli
          python -m pip install -e packages/opencontext_api
      - name: DoD sequence — install -> doctor -> index -> run -> pytest (golden)
        run: |
          opencontext install --yes tests/golden/oc_flow_bugfix_python
          opencontext doctor --strict
          opencontext index tests/golden/oc_flow_bugfix_python
          opencontext run "Fix failing test" --workflow auto \
            --root tests/golden/oc_flow_bugfix_python --json
          pytest tests/golden/oc_flow_bugfix_python -q --noconftest
      - name: B+D + e2e-dod evidence — run the real DoD journey, write evidence artifacts
        # VDM-006/007: writes .opencontext/e2e/dod-proof.json + release-evidence.json
        # at the repo root from a genuine journey; `release acceptance` reads them.
        run: python scripts/collect_release_evidence.py --root .
      - name: Restore tracked sources dirtied by the DoD journey
        # The DoD sequence runs `opencontext run` against the tracked golden fixture,
        # fixing tests/golden/oc_flow_bugfix_python/buggy_add.py IN PLACE. The full
        # suite below must run on pristine sources — fixture-precondition tests assert
        # the shipped fixture is still buggy (`return a - b`). Untracked evidence under
        # .opencontext/ (gitignored) is preserved by a tracked-only restore.
        run: git checkout -- .
      - name: CI regression gates — write .opencontext/reports/ci-gates.json
        # VDM-006: the five externally-measured C gates. Each check's exit code (0=pass)
        # becomes a boolean the acceptance evaluator reads as MET/FAILED.
        run: |
          set +e
          python -m pytest -p no:randomly -q -o addopts= ; SUITE=$?
          bash scripts/gate_k.sh ; GATEK=$?
          mypy packages/ ; MYPY=$?
          ruff check packages/ ; RUFF=$?
          # The forbidden-names guard ships as pytest assertions over public surfaces.
          python -m pytest -p no:randomly -q -o addopts= \
            tests/core/test_config.py -k "external_names or generic_names" ; FORBID=$?
          set -e
          mkdir -p .opencontext/reports
          python - "$SUITE" "$GATEK" "$MYPY" "$RUFF" "$FORBID" <<'PY'
          import json, sys
          suite, gatek, mypy, ruff, forbid = (int(a) == 0 for a in sys.argv[1:6])
          gates = {
              "suite-green": suite,
              "gate-k-12-12": gatek,
              "mypy-strict-clean": mypy,
              "ruff-clean": ruff,
              "forbidden-names-clean": forbid,
          }
          with open(".opencontext/reports/ci-gates.json", "w", encoding="utf-8") as fh:
              json.dump(gates, fh, indent=2)
          print(json.dumps(gates, indent=2))
          PY
      - name: Release acceptance (RELEASE mode — NOT_MEASURED mandatory gate fails)
        run: opencontext release acceptance --root . --release
      - name: Build release artifacts — wheels + sdists + pyz
        run: |
          for pkg in opencontext_core opencontext_profiles opencontext_memory opencontext_sdd opencontext_cli; do
            rm -rf "packages/$pkg/dist"
            python -m build "packages/$pkg" --outdir "packages/$pkg/dist"
          done
          python scripts/build_binary.py
      - name: Artifact hygiene audit (RELEASE_CONTRACT, AC-029)
        run: python scripts/audit_release_artifacts.py
      - name: Fresh-venv acceptance against the installed wheels (AC-030)
        # pytest goes into the venv because workflow verification currently
        # resolves the test runner via the runtime interpreter (known limitation).
        run: |
          set -o pipefail
          python -m venv /tmp/oc-release-venv
          /tmp/oc-release-venv/bin/pip install -q packages/*/dist/*.whl pytest
          python -m pytest tests/acceptance -p no:randomly -rxX \
            --oc-bin /tmp/oc-release-venv/bin/opencontext | tee /tmp/oc-acceptance.log
      - name: Uninstall-verify round-trip — install → purge → verify (RELEASE_CONTRACT rule 4)
        run: |
          OC=/tmp/oc-release-venv/bin/opencontext
          WS="$(mktemp -d)"; H="$(mktemp -d)"
          cp -r tests/acceptance/fixtures/py_bugfix_basic/. "$WS/"
          (cd "$WS" && HOME="$H" "$OC" install . --yes --json >/dev/null)
          (cd "$WS" && HOME="$H" "$OC" uninstall --scope workspace --purge --verify --yes --json --root .) \
            > /tmp/oc-uninstall.json
          python -c "import json,sys; d=json.load(open('/tmp/oc-uninstall.json')); sys.exit(0 if (d.get('verify') or {}).get('passed') is True else 1)"
      - name: Generate release report
        # Exit codes are 0 by construction here: any earlier stage failure stops the job.
        run: |
          VERSION="$(/tmp/oc-release-venv/bin/opencontext version --json | python -c 'import json,sys; print(json.load(sys.stdin)["opencontext"])')"
          args=(--version "$VERSION" --hygiene-exit 0 --uninstall-exit 0
                --acceptance-log /tmp/oc-acceptance.log
                --acceptance-oc-bin /tmp/oc-release-venv/bin/opencontext)
          for f in dist/opencontext.pyz packages/*/dist/*.whl packages/*/dist/*.tar.gz; do
            args+=(--artifact "$f")
          done
          python scripts/release_report.py "${args[@]}"
      - name: Upload release report
        uses: actions/upload-artifact@v4
        with:
          name: release-report
          path: artifacts/release-report.json
          if-no-files-found: error
