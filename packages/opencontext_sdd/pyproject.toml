[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "opencontext-sdd"
version = "2.0.1"
description = "Spec-Driven Development status resolver and dispatcher for OpenContext Runtime"
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "OpenContext Runtime maintainers" }]
keywords = ["sdd", "status", "opencontext", "dispatcher"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
  "opencontext-core>=1.5.0",
  "pydantic>=2.6",
]

[project.urls]
Homepage = "https://github.com/CesarMSFelipe/OpenContext-Runtime"
Issues = "https://github.com/CesarMSFelipe/OpenContext-Runtime/issues"
Source = "https://github.com/CesarMSFelipe/OpenContext-Runtime"

[tool.setuptools.packages.find]
where = ["."]
include = ["opencontext_sdd*"]

# Bundled skill markdown (work-unit-commits, chained-pr, comment-writer, …) is
# read at runtime from the package path; ship it in the wheel or a real install
# resolves empty skills.
[tool.setuptools.package-data]
opencontext_sdd = ["**/*.md"]
