[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "opencontext-cli"
version = "1.5.0"
description = "CLI adapter for OpenContext Runtime"
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "OpenContext Runtime maintainers" }]
keywords = ["ai", "llm", "context-engineering", "cli", "security"]
classifiers = [
  "Development Status :: 5 - Production/Stable",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development",
  "Topic :: Security",
]
dependencies = [
  "opencontext-core>=0.1.0",
  "opencontext-profiles>=0.1.0",
  "argcomplete>=3.0.0",
  "InquirerPy>=0.3.4",
  "textual>=0.80",
]

[project.urls]
Homepage = "https://github.com/CesarMSFelipe/OpenContext-Runtime"
Documentation = "https://github.com/CesarMSFelipe/OpenContext-Runtime#readme"
Issues = "https://github.com/CesarMSFelipe/OpenContext-Runtime/issues"
Source = "https://github.com/CesarMSFelipe/OpenContext-Runtime"

[project.scripts]
opencontext = "opencontext_cli.main:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["opencontext_cli*"]
