[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "opencontext-core"
version = "1.4.0"
description = "Core context engineering runtime for OpenContext Runtime"
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "OpenContext Runtime maintainers" }]
keywords = ["ai", "llm", "context-engineering", "security", "prompt-engineering"]
classifiers = [
  "Development Status :: 5 - Production/Stable",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Topic :: Security",
]
dependencies = [
  "pydantic>=2.6",
  "PyYAML>=6.0",
  "tree-sitter>=0.24",
  "tree-sitter-python>=0.25",
  "watchdog>=6.0",
  "rich>=13.0",
  "prompt-toolkit>=3.0",
]

[project.urls]
Homepage = "https://github.com/CesarMSFelipe/OpenContext-Runtime"
Documentation = "https://github.com/CesarMSFelipe/OpenContext-Runtime#readme"
Issues = "https://github.com/CesarMSFelipe/OpenContext-Runtime/issues"
Source = "https://github.com/CesarMSFelipe/OpenContext-Runtime"

[tool.setuptools.packages.find]
where = ["."]
include = ["opencontext_core*"]
exclude = []
