[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "opencontext-core"
version = "2.0.1"
description = "Core context engineering runtime for OpenContext Runtime"
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "OpenContext Runtime maintainers" }]
keywords = ["ai", "llm", "context-engineering", "security", "prompt-engineering"]
classifiers = [
  "Development Status :: 5 - Production/Stable",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Topic :: Security",
]
dependencies = [
  "pydantic>=2.6",
  "PyYAML>=6.0",
  "tree-sitter>=0.24",
  "tree-sitter-javascript>=0.23",
  "tree-sitter-python>=0.25",
  "tree-sitter-typescript>=0.23",
  # Multi-language KG grammars. Each wheel BUNDLES its compiled grammar
  # (offline-safe, no runtime download) and loads against tree-sitter>=0.24;
  # versions below were verified ABI-compatible with tree-sitter 0.25.2 in a
  # clean venv. go/rust/java/php have dedicated extractors; c/cpp/ruby/c-sharp
  # go through the generic declaration extractor. NOTE: tree-sitter-php exposes
  # language_php(), not language() — handled in _init_tree_sitter.
  "tree-sitter-go>=0.23",
  "tree-sitter-rust>=0.23",
  "tree-sitter-java>=0.23",
  "tree-sitter-php>=0.23",
  "tree-sitter-c>=0.23",
  "tree-sitter-cpp>=0.23",
  "tree-sitter-ruby>=0.23",
  "tree-sitter-c-sharp>=0.23",
  "watchdog>=6.0",
  "rich>=13.0",
  # prompts.py drives every interactive selector through InquirerPy; it pulls
  # prompt-toolkit transitively, so core degrades to arrow keys, not just Rich.
  "InquirerPy>=0.3.4",
  # XDG / %LOCALAPPDATA% path resolution for user-mode storage (PR user-dir-storage).
  "platformdirs>=4.0",
]

[project.urls]
Homepage = "https://github.com/CesarMSFelipe/OpenContext-Runtime"
Documentation = "https://github.com/CesarMSFelipe/OpenContext-Runtime#readme"
Issues = "https://github.com/CesarMSFelipe/OpenContext-Runtime/issues"
Source = "https://github.com/CesarMSFelipe/OpenContext-Runtime"

[tool.setuptools.packages.find]
where = ["."]
include = ["opencontext_core*"]
exclude = []

[tool.setuptools.package-data]
# Runtime data files loaded from within the package: builtin workflow/harness/
# persona/skill YAML, host-instruction profiles (configurator/profiles/*.md),
# and all SDD skill templates + builtin skill markdown. These are read at runtime
# via the package path, so they MUST ship in the wheel — a partial list silently
# drops the host profiles and skill templates on a real install. Recursive globs
# so a new builtin never needs a packaging edit.
opencontext_core = [
  "studio/static/*",
  "**/*.yaml",
  "**/*.yml",
  "**/*.md",
]

[project.optional-dependencies]
dev = ["types-PyYAML", "types-requests"]
# Studio web shell (PR-014) — optional; the read-only data layer needs neither.
studio = ["fastapi>=0.110,<0.136.3", "uvicorn>=0.30"]
