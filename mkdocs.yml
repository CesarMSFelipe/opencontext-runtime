site_name: OpenContext Runtime
site_description: The local runtime that gives your AI coding agent verified context.
site_url: https://CesarMSFelipe.github.io/OpenContext-Runtime
site_author: OpenContext Runtime maintainers

repo_name: CesarMSFelipe/OpenContext-Runtime
repo_url: https://github.com/CesarMSFelipe/OpenContext-Runtime
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.trimming
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      lang:
        - en

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.mark
  - attr_list
  - md_in_html
  - tables

extra:
  generator: false

