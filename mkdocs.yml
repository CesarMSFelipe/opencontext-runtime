site_name: OpenContext Runtime
site_description: Context engineering runtime for AI coding agents. Up to 96% token reduction.
site_url: https://CesarMSFelipe.github.io/OpenContext-Runtime
site_author: OpenContext Runtime maintainers

repo_name: CesarMSFelipe/OpenContext-Runtime
repo_url: https://github.com/CesarMSFelipe/OpenContext-Runtime
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.trimming
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      lang:
        - en

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.mark
  - attr_list
  - md_in_html
  - tables

extra:
  generator: false

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - getting-started/quickstart.md
    - getting-started/installation.md
    - getting-started/first-context-pack.md
    - getting-started/runtime-first.md
    - getting-started/zero-key-mode.md
    - getting-started/cli-installation.md
    - getting-started/troubleshooting.md
  - Product:
    - product/index.md
    - product/installation-experience.md
    - product/community-sdd-tdd-gap-analysis.md
  - Concepts:
    - concepts/index.md
    - concepts/what-is-context-engineering.md
  - Configuration:
    - configuration/index.md
    - configuration/overview.md
    - configuration/defaults.md
    - configuration/security-policy.md
    - configuration/provider-policy.md
    - configuration/tool-policy.md
    - configuration/memory-policy.md
    - configuration/plugins.md
    - configuration/templates.md
  - Workflows:
    - workflows/index.md
    - workflows/overview.md
    - workflows/sdd-workflow.md
    - workflows/modes.md
  - Integrations:
    - integrations/index.md
    - integrations/opencode-kilo-code.md
    - integrations/claude-code.md
    - integrations/cursor.md
    - integrations/codex.md
    - integrations/windsurf.md
    - integrations/python-sdk.md
    - integrations/api.md
    - integrations/cli.md
  - Development:
    - development/index.md
    - development/architecture-boundaries.md
    - development/testing.md
    - development/contributing.md
    - development/adding-a-command.md
    - development/adding-a-profile.md
    - development/adding-a-serializer.md
    - development/adding-a-memory-backend.md
  - Performance:
    - performance/index.md
  - Quality:
    - quality/index.md
  - Operations:
    - operations/index.md
  - Enterprise:
    - enterprise/index.md
  - Profiles:
    - profiles/index.md
  - Reference:
    - configuration/reference.md

extra_css:
  - stylesheets/extra.css