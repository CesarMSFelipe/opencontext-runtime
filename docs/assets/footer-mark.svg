        font-size="13" font-weight="600" fill="#E6EDF3">OpenContext Runtime</text>
  <text x="360" y="46" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#8B949E">Small context. Full trace. Verified execution.</text>

  <!-- Right: teal accent line -->
  <line x1="672" y1="16" x2="706" y2="16" stroke="#00C9A7" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="672" y1="24" x2="706" y2="24" stroke="rgba(0,201,167,0.4)" stroke-width="1" stroke-linecap="round"/>
  <line x1="672" y1="32" x2="706" y2="32" stroke="rgba(0,201,167,0.2)" stroke-width="1" stroke-linecap="round"/>
  <line x1="678" y1="40" x2="706" y2="40" stroke="rgba(0,201,167,0.1)" stroke-width="1" stroke-linecap="round"/>
  <line x1="686" y1="48" x2="706" y2="48" stroke="rgba(0,201,167,0.05)" stroke-width="1" stroke-linecap="round"/>

</svg>
