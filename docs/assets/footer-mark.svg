<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 64" width="720" height="64" role="img" aria-label="OpenContext Runtime — Small context. Full trace. Verified execution.">

  <rect width="720" height="64" rx="10" fill="#0B0F14"/>
  <rect x="1" y="1" width="718" height="62" rx="9" fill="none" stroke="rgba(0,201,167,0.12)" stroke-width="1"/>

  <!-- Left: small logo mark (circle nodes) -->
  <circle cx="28" cy="32" r="5" fill="none" stroke="#00C9A7" stroke-width="1.5"/>
  <circle cx="48" cy="22" r="3.5" fill="none" stroke="#00A8E8" stroke-width="1.5"/>
  <circle cx="48" cy="42" r="3.5" fill="none" stroke="#845EC2" stroke-width="1.5"/>
  <line x1="33" y1="29" x2="45" y2="24" stroke="rgba(0,201,167,0.4)" stroke-width="1"/>
  <line x1="33" y1="35" x2="45" y2="40" stroke="rgba(132,92,194,0.4)" stroke-width="1"/>

  <!-- Center: brand line -->
  <text x="360" y="27" text-anchor="middle"
