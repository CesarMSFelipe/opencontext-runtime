<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 128" width="720" height="128" role="img" aria-label="Security defaults: external providers disabled, secrets auto-redacted, MCP tools blocked until allow-listed, missing policy fail closed">

  <rect width="720" height="128" rx="14" fill="#0B0F14"/>
  <rect x="1" y="1" width="718" height="126" rx="13" fill="none" stroke="rgba(255,123,114,0.12)" stroke-width="1"/>

  <!-- Eyebrow -->
  <text x="360" y="22" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" font-weight="600" fill="#606978" letter-spacing="1.2">SECURITY DEFAULTS  ·  NO CONFIGURATION REQUIRED</text>

  <!-- Card 1: External providers -->
  <rect x="16" y="34" width="162" height="78" rx="8" fill="#111821" stroke="rgba(232,112,106,0.5)" stroke-width="1"/>
  <text x="97" y="63" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="700" fill="#E8706A">Disabled</text>
  <text x="97" y="81" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#9DA6B0">External providers</text>
  <text x="97" y="96" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9" fill="#606978">no egress by default</text>

  <!-- Card 2: Secrets -->
  <rect x="192" y="34" width="162" height="78" rx="8" fill="#111821" stroke="rgba(45,196,164,0.5)" stroke-width="1"/>
  <text x="273" y="63" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="700" fill="#2DC4A4">Auto-Redacted</text>
  <text x="273" y="81" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#9DA6B0">Secrets in context</text>
  <text x="273" y="96" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9" fill="#606978">keys, tokens, passwords</text>

  <!-- Card 3: MCP tools -->
  <rect x="368" y="34" width="162" height="78" rx="8" fill="#111821" stroke="rgba(212,168,64,0.5)" stroke-width="1"/>
  <text x="449" y="63" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="700" fill="#D4A840">Blocked</text>
  <text x="449" y="81" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#9DA6B0">MCP tools</text>
  <text x="449" y="96" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9" fill="#606978">until explicitly allow-listed</text>

  <!-- Card 4: Missing policy -->
  <rect x="544" y="34" width="160" height="78" rx="8" fill="#111821" stroke="rgba(232,112,106,0.5)" stroke-width="1"/>
  <text x="624" y="63" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="700" fill="#E8706A">Fail Closed</text>
  <text x="624" y="81" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#9DA6B0">Missing policy</text>
  <text x="624" y="96" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9" fill="#606978">deny by default</text>

</svg>
