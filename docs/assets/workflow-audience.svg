<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 210" width="720" height="210" role="img" aria-label="Built for real agent workflows: agent users, large repositories, structured SDD, security-first teams">

  <rect width="720" height="210" rx="14" fill="#0B0F14"/>
  <rect x="1" y="1" width="718" height="208" rx="13" fill="none" stroke="rgba(0,201,167,0.12)" stroke-width="1"/>

  <!-- Section eyebrow -->
  <text x="360" y="28" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" font-weight="600" fill="#606978" letter-spacing="1.2">BUILT FOR REAL AGENT WORKFLOWS</text>

  <!-- TOP LEFT — Agent users -->
  <rect x="20" y="42" width="330" height="74" rx="8" fill="#111821" stroke="rgba(0,201,167,0.25)" stroke-width="1"/>
  <rect x="20" y="42" width="4" height="74" rx="2" fill="#2DC4A4"/>
  <text x="34" y="64"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="12" font-weight="700" fill="#E6EDF3">Agent Users</text>
  <text x="34" y="80"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#606978">Claude Code · Cursor · Copilot · Windsurf</text>
  <text x="34" y="98"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#9DA6B0">Replace many grep+read rounds with one</text>
  <text x="34" y="111"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#9DA6B0">deterministic call, call graph included.</text>

  <!-- TOP RIGHT — Large repositories -->
  <rect x="370" y="42" width="330" height="74" rx="8" fill="#111821" stroke="rgba(0,168,232,0.25)" stroke-width="1"/>
  <rect x="370" y="42" width="4" height="74" rx="2" fill="#35ADE5"/>
  <text x="384" y="64"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="12" font-weight="700" fill="#E6EDF3">Large Repositories</text>
  <text x="384" y="80"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#606978">1,000+ files · monorepos · multi-language</text>
  <text x="384" y="98"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#9DA6B0">Symbol-level retrieval stays inside budget</text>
  <text x="384" y="111"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#9DA6B0">without reading 56,000-token modules.</text>

  <!-- BOTTOM LEFT — Structured SDD -->
  <rect x="20" y="130" width="330" height="64" rx="8" fill="#111821" stroke="rgba(132,92,194,0.25)" stroke-width="1"/>
  <rect x="20" y="130" width="4" height="64" rx="2" fill="#8A6BBF"/>
  <text x="34" y="152"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="12" font-weight="700" fill="#E6EDF3">Structured AI Workflows</text>
  <text x="34" y="170"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#9DA6B0">9-phase SDD harness with explicit gates,</text>
  <text x="34" y="185"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#9DA6B0">local memory, and per-phase model routing.</text>

  <!-- BOTTOM RIGHT — Security teams -->
  <rect x="370" y="130" width="330" height="64" rx="8" fill="#111821" stroke="rgba(255,123,114,0.20)" stroke-width="1"/>
  <rect x="370" y="130" width="4" height="64" rx="2" fill="#E8706A"/>
  <text x="384" y="152"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="12" font-weight="700" fill="#E6EDF3">Security-First Teams</text>
  <text x="384" y="170"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#9DA6B0">Fully offline. Secrets auto-redacted. MCP</text>
  <text x="384" y="185"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#9DA6B0">tools blocked until explicitly allow-listed.</text>

</svg>
