<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 88" width="720" height="88" role="img" aria-label="OpenContext key stats measured on 3 public repos: 42-87% fewer tokens than reading the relevant files whole, one ranked call, call graph included, same result every run">

  <rect width="720" height="88" rx="12" fill="#0B0F14"/>
  <rect x="1" y="1" width="718" height="86" rx="11" fill="none" stroke="rgba(0,201,167,0.18)" stroke-width="1"/>

  <!-- Stat 1: token reduction -->
  <rect x="12" y="10" width="166" height="68" rx="8" fill="#111821" stroke="rgba(0,201,167,0.22)" stroke-width="1"/>
  <text x="95" y="40" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="26" font-weight="700" fill="#2DC4A4">42–87%</text>
  <text x="95" y="58" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#9DA6B0">fewer tokens vs whole files</text>
  <text x="95" y="72" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9.5" fill="#606978">measured on 3 public repos</text>

  <!-- Stat 2: rounds -->
  <rect x="190" y="10" width="166" height="68" rx="8" fill="#111821" stroke="rgba(0,168,232,0.22)" stroke-width="1"/>
  <text x="273" y="34" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="13" font-weight="600" fill="#9DA6B0">whole files</text>
  <text x="273" y="54" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="18" font-weight="700" fill="#35ADE5">→ 1 call</text>
  <text x="273" y="71" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#9DA6B0">one ranked, budgeted pack</text>

  <!-- Stat 3: call graph -->
  <rect x="368" y="10" width="166" height="68" rx="8" fill="#111821" stroke="rgba(132,92,194,0.22)" stroke-width="1"/>
  <text x="451" y="36" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="13" fill="#9DA6B0">call graph</text>
  <text x="451" y="54" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="22" font-weight="700" fill="#8A6BBF">included</text>
  <text x="451" y="70" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#9DA6B0">grep can't give call direction</text>

  <!-- Stat 4: deterministic -->
  <rect x="546" y="10" width="162" height="68" rx="8" fill="#111821" stroke="rgba(0,201,167,0.14)" stroke-width="1"/>
  <text x="627" y="46" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="18" font-weight="700" fill="#2DC4A4">deterministic</text>
  <text x="627" y="66" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#9DA6B0">same query, same ranked result</text>

</svg>
