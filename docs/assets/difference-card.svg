<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 168" width="720" height="168" role="img" aria-label="OpenContext builds context before the agent starts: trace call graph, rank symbols, apply token budget, deliver verified pack in one call">

  <rect width="720" height="168" rx="14" fill="#0B0F14"/>
  <rect x="1" y="1" width="718" height="166" rx="13" fill="none" stroke="rgba(0,201,167,0.15)" stroke-width="1"/>

  <!-- Eyebrow -->
  <text x="360" y="26" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" font-weight="600" fill="#3D4450" letter-spacing="1.2">THE OPENCONTEXT DIFFERENCE</text>

  <!-- Step cards + connectors -->
  <!-- Card 1: Trace Graph -->
  <rect x="20" y="40" width="150" height="76" rx="8" fill="#111821" stroke="rgba(0,201,167,0.30)" stroke-width="1"/>
  <rect x="20" y="40" width="150" height="4" rx="2" fill="#00C9A7"/>
  <text x="95" y="66" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" font-weight="600" fill="#3D4450" letter-spacing="0.6">01</text>
  <text x="95" y="83" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="13" font-weight="700" fill="#00C9A7">Trace Graph</text>
  <text x="95" y="101" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#8B949E">call chains · imports</text>

  <!-- Arrow 1 -->
  <line x1="172" y1="78" x2="190" y2="78" stroke="#21262D" stroke-width="1.5"/>
  <polygon points="190,74 190,82 198,78" fill="#21262D"/>

  <!-- Card 2: Rank Symbols -->
  <rect x="200" y="40" width="150" height="76" rx="8" fill="#111821" stroke="rgba(0,168,232,0.30)" stroke-width="1"/>
  <rect x="200" y="40" width="150" height="4" rx="2" fill="#00A8E8"/>
  <text x="275" y="66" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" font-weight="600" fill="#3D4450" letter-spacing="0.6">02</text>
  <text x="275" y="83" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="13" font-weight="700" fill="#00A8E8">Rank Symbols</text>
  <text x="275" y="101" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#8B949E">relevance · git · memory</text>

  <!-- Arrow 2 -->
  <line x1="352" y1="78" x2="370" y2="78" stroke="#21262D" stroke-width="1.5"/>
  <polygon points="370,74 370,82 378,78" fill="#21262D"/>

  <!-- Card 3: Apply Budget -->
  <rect x="380" y="40" width="150" height="76" rx="8" fill="#111821" stroke="rgba(132,92,194,0.30)" stroke-width="1"/>
  <rect x="380" y="40" width="150" height="4" rx="2" fill="#845EC2"/>
  <text x="455" y="66" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" font-weight="600" fill="#3D4450" letter-spacing="0.6">03</text>
  <text x="455" y="83" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="13" font-weight="700" fill="#845EC2">Apply Budget</text>
  <text x="455" y="101" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#8B949E">contract · token limit</text>

  <!-- Arrow 3 -->
  <line x1="532" y1="78" x2="550" y2="78" stroke="#21262D" stroke-width="1.5"/>
  <polygon points="550,74 550,82 558,78" fill="#21262D"/>

  <!-- Card 4: Verified Pack -->
  <rect x="560" y="40" width="140" height="76" rx="8" fill="#0A1F1A" stroke="rgba(0,201,167,0.45)" stroke-width="1.5"/>
  <rect x="560" y="40" width="140" height="4" rx="2" fill="#00C9A7"/>
  <text x="630" y="66" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" font-weight="600" fill="#3D4450" letter-spacing="0.6">04</text>
  <text x="630" y="83" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="13" font-weight="700" fill="#00C9A7">Verified Pack  ✓</text>
  <text x="630" y="101" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#8B949E">1 call · deterministic</text>

  <!-- Footer tagline -->
  <text x="360" y="148" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#3D4450">Built before the agent starts. Same result every run. No LLM guessing what's relevant.</text>

</svg>
