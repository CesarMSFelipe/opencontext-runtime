<svg xmlns="http://www.w3.org/2000/svg" width="720" height="240" viewBox="0 0 720 240" role="img" aria-label="OpenContext configuration menu with project setup runtime workflow memory and maintenance categories">
  <title>Config Menu</title>
  <rect width="720" height="240" rx="18" fill="#0B0F14"/>
  <text x="28" y="36" fill="#E6EDF3" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700">Configuration explains impact</text>
  <g font-family="monospace" font-size="14">
    <rect x="28" y="58" width="160" height="150" rx="10" fill="#11161D" stroke="#6C757D"/>
    <text x="46" y="84" fill="#00C9A7">Project setup</text>
    <text x="46" y="108" fill="#E6EDF3">Runtime</text>
    <text x="46" y="132" fill="#E6EDF3">Agentic workflow</text>
    <text x="46" y="156" fill="#E6EDF3">Memory</text>
    <text x="46" y="180" fill="#E6EDF3">Maintenance</text>
    <rect x="206" y="58" width="180" height="150" rx="10" fill="#11161D" stroke="#00C9A7"/>
    <text x="224" y="84" fill="#E6EDF3">Memory backend</text>
    <text x="224" y="108" fill="#6C757D">Current: local</text>
    <text x="224" y="132" fill="#6C757D">Effect: phase memory</text>
    <text x="224" y="156" fill="#6C757D">Recommended: auto/local</text>
    <rect x="404" y="58" width="288" height="150" rx="10" fill="#11161D" stroke="#00A8E8"/>
    <text x="422" y="84" fill="#E6EDF3">Risk / note: Engram is external.</text>
    <text x="422" y="108" fill="#E6EDF3">CLI: opencontext config set</text>
    <text x="422" y="132" fill="#FFC75F">No hidden marketing claims.</text>
    <text x="422" y="156" fill="#6C757D">Every option says what changes.</text>
  </g>
</svg>
