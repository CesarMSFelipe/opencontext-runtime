<svg xmlns="http://www.w3.org/2000/svg" width="720" height="180" viewBox="0 0 720 180" role="img" aria-label="OpenContext product status: stable, release candidate, host dependent, opt-in">
  <title>Release Candidate Status</title>
  <rect width="720" height="180" rx="18" fill="#0B0F14"/>
  <text x="28" y="36" fill="#E6EDF3" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700">OpenContext status</text>
  <g font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">
    <rect x="28" y="58" width="154" height="92" rx="12" fill="#10251f" stroke="#00C9A7"/>
    <text x="44" y="84" fill="#00C9A7" font-weight="700">Stable</text>
    <text x="44" y="108" fill="#E6EDF3">index · KG · pack</text>
    <text x="44" y="130" fill="#E6EDF3">memory · uninstall</text>
    <rect x="198" y="58" width="154" height="92" rx="12" fill="#201a10" stroke="#FFC75F"/>
    <text x="214" y="84" fill="#FFC75F" font-weight="700">Release candidate</text>
    <text x="214" y="108" fill="#E6EDF3">oc-new · TUI</text>
    <text x="214" y="130" fill="#E6EDF3">graph · signals</text>
    <rect x="368" y="58" width="154" height="92" rx="12" fill="#101e28" stroke="#00A8E8"/>
    <text x="384" y="84" fill="#00A8E8" font-weight="700">Host dependent</text>
    <text x="384" y="108" fill="#E6EDF3">MCP sampling</text>
    <text x="384" y="130" fill="#E6EDF3">generative phases</text>
    <rect x="538" y="58" width="154" height="92" rx="12" fill="#1a1428" stroke="#845EC2"/>
    <text x="554" y="84" fill="#BFA4FF" font-weight="700">Opt-in</text>
    <text x="554" y="108" fill="#E6EDF3">Engram · providers</text>
    <text x="554" y="130" fill="#E6EDF3">semantic/vector</text>
  </g>
</svg>
