  <!-- Row 4 — django -->
  <rect x="0" y="188" width="720" height="48" rx="14" fill="#0B0F14"/>
  <rect x="0" y="188" width="720" height="14" fill="#0B0F14"/>
  <text x="20" y="207"
        font-family="'JetBrains Mono','Cascadia Code',Consolas,monospace"
        font-size="11" fill="#00A8E8">django/django</text>
  <text x="20" y="224"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#3D4450">2,922 Python files</text>
  <text x="220" y="207"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#E6EDF3">project overview</text>
  <text x="440" y="207"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#3D4450">impractical</text>
  <text x="440" y="224"
