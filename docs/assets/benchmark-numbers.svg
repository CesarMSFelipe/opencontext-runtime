  <text x="570" y="80"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#3D4450">1 call</text>
  <rect x="668" y="52" width="44" height="24" rx="6" fill="rgba(0,201,167,0.15)" stroke="rgba(0,201,167,0.35)" stroke-width="1"/>
