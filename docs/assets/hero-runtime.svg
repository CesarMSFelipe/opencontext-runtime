<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200" role="img" aria-label="From agent request to verified context in one call: an AI coding agent asks; OpenContext Runtime traces the call graph, ranks symbols, applies a token budget and verifies; a verified context pack is returned in one call. Guarantees: graph traced, budget locked, gates checked, pack delivered.">

  <rect width="720" height="200" rx="14" fill="#0B0F14"/>
  <rect x="1" y="1" width="718" height="198" rx="13" fill="none" stroke="rgba(0,201,167,0.14)" stroke-width="1"/>

  <!-- Eyebrow -->
  <text x="360" y="26" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" font-weight="600" fill="#606978" letter-spacing="1.2">FROM AGENT REQUEST TO VERIFIED CONTEXT — IN ONE CALL</text>

  <!-- Stage 1: agent -->
  <rect x="24" y="44" width="176" height="74" rx="9" fill="#111821" stroke="#21262D" stroke-width="1"/>
  <text x="112" y="80" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" font-weight="700" fill="#E6EDF3">AI coding agent</text>
  <text x="112" y="99" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9.5" fill="#606978">asks for context</text>

  <!-- arrow 1 -->
  <text x="236" y="89" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="22" font-weight="600" fill="#2DC4A4">&#8594;</text>

  <!-- Stage 2: runtime (emphasis) -->
  <rect x="272" y="44" width="176" height="74" rx="9" fill="#111821" stroke="rgba(0,201,167,0.5)" stroke-width="1.5"/>
  <text x="360" y="80" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" font-weight="700" fill="#2DC4A4">OpenContext Runtime</text>
  <text x="360" y="99" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#9DA6B0">trace · rank · budget · verify</text>

  <!-- arrow 2 -->
  <text x="484" y="89" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="22" font-weight="600" fill="#35ADE5">&#8594;</text>

  <!-- Stage 3: verified pack -->
  <rect x="520" y="44" width="176" height="74" rx="9" fill="#111821" stroke="rgba(0,168,232,0.35)" stroke-width="1"/>
  <text x="608" y="80" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" font-weight="700" fill="#35ADE5">Verified pack</text>
  <text x="608" y="99" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9.5" fill="#606978">returned in one call</text>

  <!-- Guarantee pills -->
  <rect x="31" y="150" width="148" height="26" rx="6" fill="rgba(0,201,167,0.08)" stroke="rgba(0,201,167,0.28)" stroke-width="1"/>
  <circle cx="49" cy="163" r="4" fill="#2DC4A4"/>
  <text x="60" y="167" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="500" fill="#2DC4A4">graph traced</text>

  <rect x="201" y="150" width="148" height="26" rx="6" fill="rgba(0,168,232,0.08)" stroke="rgba(0,168,232,0.25)" stroke-width="1"/>
  <circle cx="219" cy="163" r="4" fill="#35ADE5"/>
  <text x="230" y="167" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="500" fill="#35ADE5">budget locked</text>

  <rect x="371" y="150" width="148" height="26" rx="6" fill="rgba(227,179,65,0.08)" stroke="rgba(227,179,65,0.28)" stroke-width="1"/>
  <circle cx="389" cy="163" r="4" fill="#D4A840"/>
  <text x="400" y="167" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="500" fill="#D4A840">gates checked</text>

  <rect x="541" y="150" width="148" height="26" rx="6" fill="rgba(0,201,167,0.08)" stroke="rgba(0,201,167,0.22)" stroke-width="1"/>
  <circle cx="559" cy="163" r="4" fill="#2DC4A4"/>
  <text x="570" y="167" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="500" fill="#E6EDF3">pack delivered</text>

</svg>
