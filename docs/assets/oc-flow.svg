<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 150" width="720" height="150" role="img" aria-label="OC Flow: focused task to context, ApplyEdit, policy, tests, verified result; generation uses MCP sampling or a configured provider">
  <rect width="720" height="150" rx="14" fill="#0B0F14"/>
  <rect x="1" y="1" width="718" height="148" rx="13" fill="none" stroke="rgba(0,201,167,0.14)"/>

  <text x="28" y="34" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="700" fill="#E6EDF3">OC Flow</text>
  <text x="28" y="54" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#9DA6B0">Fast path for focused fixes: local context + governed mutation + real verification.</text>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="600">
    <rect x="28" y="82" width="100" height="42" rx="8" fill="#111821" stroke="#21262D"/>
    <text x="78" y="101" text-anchor="middle" fill="#E6EDF3">Task</text>
    <text x="78" y="116" text-anchor="middle" fill="#606978" font-size="9">Fix failing test</text>

    <text x="142" y="108" fill="#2F3742">›</text>

    <rect x="158" y="82" width="100" height="42" rx="8" fill="#111821" stroke="#21262D"/>
    <text x="208" y="101" text-anchor="middle" fill="#E6EDF3">Context</text>
    <text x="208" y="116" text-anchor="middle" fill="#606978" font-size="9">KG + impact</text>

    <text x="272" y="108" fill="#2F3742">›</text>

    <rect x="288" y="82" width="120" height="42" rx="8" fill="#151826" stroke="rgba(132,92,194,0.45)"/>
    <text x="348" y="101" text-anchor="middle" fill="#C9B6FF">Generative executor</text>
    <text x="348" y="116" text-anchor="middle" fill="#8C7AC0" font-size="9">MCP host or provider</text>

    <text x="422" y="108" fill="#2F3742">›</text>

    <rect x="438" y="82" width="100" height="42" rx="8" fill="#0D2220" stroke="rgba(0,201,167,0.45)"/>
    <text x="488" y="101" text-anchor="middle" fill="#2DC4A4">ApplyEdit</text>
    <text x="488" y="116" text-anchor="middle" fill="#74D8C1" font-size="9">policy + receipt</text>

    <text x="552" y="108" fill="#2F3742">›</text>

    <rect x="568" y="82" width="124" height="42" rx="8" fill="#111821" stroke="rgba(0,168,232,0.45)"/>
    <text x="630" y="101" text-anchor="middle" fill="#7BD9FF">Verify</text>
    <text x="630" y="116" text-anchor="middle" fill="#8EA6B5" font-size="9">tests pass or no complete</text>
  </g>

  <line x1="288" y1="72" x2="408" y2="72" stroke="rgba(132,92,194,0.35)" stroke-dasharray="4 4"/>
  <text x="348" y="68" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#9DA6B0">only this box needs a model</text>
</svg>
