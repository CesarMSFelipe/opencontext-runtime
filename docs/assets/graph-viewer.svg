<svg xmlns="http://www.w3.org/2000/svg" width="720" height="240" viewBox="0 0 720 240" role="img" aria-label="OpenContext graph viewer showing knowledge graph nodes and run phase graph">
  <title>Graph Viewer</title>
  <rect width="720" height="240" rx="18" fill="#0B0F14"/>
  <text x="28" y="36" fill="#E6EDF3" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700">Graph viewer</text>
  <g stroke-width="3" stroke="#6C757D">
    <line x1="156" y1="104" x2="260" y2="74"/><line x1="156" y1="104" x2="260" y2="148"/><line x1="260" y1="74" x2="408" y2="112"/><line x1="260" y1="148" x2="408" y2="112"/><line x1="408" y1="112" x2="542" y2="90"/><line x1="408" y1="112" x2="542" y2="156"/>
  </g>
  <g font-family="monospace" font-size="13" text-anchor="middle">
    <circle cx="156" cy="104" r="28" fill="#10251f" stroke="#00C9A7" stroke-width="2"/><text x="156" y="109" fill="#E6EDF3">file</text>
    <circle cx="260" cy="74" r="28" fill="#101e28" stroke="#00A8E8" stroke-width="2"/><text x="260" y="79" fill="#E6EDF3">symbol</text>
    <circle cx="260" cy="148" r="28" fill="#101e28" stroke="#00A8E8" stroke-width="2"/><text x="260" y="153" fill="#E6EDF3">test</text>
    <circle cx="408" cy="112" r="30" fill="#1a1428" stroke="#845EC2" stroke-width="2"/><text x="408" y="117" fill="#E6EDF3">phase</text>
    <circle cx="542" cy="90" r="28" fill="#201a10" stroke="#FFC75F" stroke-width="2"/><text x="542" y="95" fill="#E6EDF3">gate</text>
    <circle cx="542" cy="156" r="28" fill="#201a10" stroke="#FFC75F" stroke-width="2"/><text x="542" y="161" fill="#E6EDF3">receipt</text>
  </g>
</svg>
