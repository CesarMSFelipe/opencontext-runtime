<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" width="720" height="160" role="img" aria-label="TDD workflow: explore (offline), write test (red — failing), implement, verify (green — passing), refactor, verify (offline). Repeat write test → verify until green.">

  <rect width="720" height="160" rx="8" fill="#0B0F14"/>

  <text x="36" y="24" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#3D4450" letter-spacing="0.5">TDD WORKFLOW</text>

  <!-- Connector arrows -->
  <g stroke="#21262D" stroke-width="1.5" fill="none">
    <line x1="127" y1="72" x2="133" y2="72"/>
    <line x1="213" y1="72" x2="219" y2="72"/>
    <line x1="299" y1="72" x2="305" y2="72"/>
    <line x1="385" y1="72" x2="391" y2="72"/>
    <line x1="471" y1="72" x2="477" y2="72"/>
  </g>
  <g fill="#21262D">
    <polygon points="133,68 133,76 141,72"/>
    <polygon points="219,68 219,76 227,72"/>
    <polygon points="305,68 305,76 313,72"/>
    <polygon points="391,68 391,76 399,72"/>
    <polygon points="477,68 477,76 485,72"/>
  </g>

  <!-- 1: explore (offline) -->
  <rect x="36" y="46" width="91" height="52" rx="5" fill="#0D1117" stroke="#00A8E8" stroke-width="1"/>
  <text x="81" y="68" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#00A8E8">explore</text>
  <text x="81" y="83" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9" fill="#3D4450">offline</text>

  <!-- 2: write test (RED) -->
  <rect x="133" y="46" width="80" height="52" rx="5" fill="#1A0A0A" stroke="#FF7B72" stroke-width="1"/>
  <text x="173" y="65" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#FF7B72">write test</text>
  <text x="173" y="81" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9" fill="#FF7B72">● red</text>

  <!-- 3: implement -->
  <rect x="219" y="46" width="80" height="52" rx="5" fill="#111821" stroke="#21262D" stroke-width="1"/>
  <text x="259" y="72" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#E6EDF3">implement</text>

  <!-- 4: verify green -->
  <rect x="305" y="46" width="80" height="52" rx="5" fill="#0A1F1A" stroke="#00C9A7" stroke-width="1"/>
  <text x="345" y="65" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#00C9A7">verify</text>
  <text x="345" y="81" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9" fill="#00C9A7">● green</text>

  <!-- 5: refactor -->
  <rect x="391" y="46" width="80" height="52" rx="5" fill="#111821" stroke="#21262D" stroke-width="1"/>
  <text x="431" y="72" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#E6EDF3">refactor</text>

  <!-- 6: verify (offline) -->
  <rect x="477" y="46" width="91" height="52" rx="5" fill="#0D1117" stroke="#00A8E8" stroke-width="1"/>
  <text x="522" y="65" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#00A8E8">verify</text>
  <text x="522" y="81" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9" fill="#3D4450">offline</text>

  <!-- "repeat" loop bracket under write test → verify -->
  <g stroke="#845EC2" stroke-width="1" fill="none" stroke-dasharray="3 2">
    <line x1="133" y1="104" x2="133" y2="118"/>
    <line x1="133" y1="118" x2="385" y2="118"/>
    <line x1="385" y1="118" x2="385" y2="104"/>
  </g>
  <text x="259" y="133" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9" fill="#845EC2">repeat until green</text>

  <!-- Legend -->
  <rect x="36" y="143" width="8" height="8" rx="1" fill="#0D1117" stroke="#00A8E8" stroke-width="1"/>
  <text x="48" y="152" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9" fill="#3D4450">works without LLM</text>
  <rect x="170" y="143" width="8" height="8" rx="1" fill="#111821" stroke="#21262D" stroke-width="1"/>
  <text x="182" y="152" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9" fill="#3D4450">requires LLM</text>
  <rect x="282" y="143" width="8" height="8" rx="1" fill="#1A0A0A" stroke="#FF7B72" stroke-width="1"/>
  <text x="294" y="152" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9" fill="#3D4450">failing (red)</text>
  <rect x="370" y="143" width="8" height="8" rx="1" fill="#0A1F1A" stroke="#00C9A7" stroke-width="1"/>
  <text x="382" y="152" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9" fill="#3D4450">passing (green)</text>

</svg>
