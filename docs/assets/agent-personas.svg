<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 208" width="720" height="208" role="img" aria-label="Seven OC personas, one per SDD phase: OC Explorer (explore), OC Orchestrator (propose, spec, tasks), OC Architect (design), OC Builder (apply), OC Tester (test), OC Reviewer (verify, review), and OC Professor (explains the why before the code).">
  <style>
    text { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif; }
    .hd { font-size: 11px; letter-spacing: 1px; fill: #606978; }
    .ph { font-size: 11px; letter-spacing: 0.5px; }
    .nm { font-size: 13px; font-weight: bold; fill: #E6EDF3; }
    .rl { font-size: 12px; fill: #9DA6B0; }
  </style>
  <rect width="720" height="208" rx="8" fill="#0B0F14"/>
  <text x="20" y="24" class="hd">OC PERSONAS  ·  ONE PER SDD PHASE</text>

  <rect x="20" y="38" width="3" height="22" rx="1.5" fill="#2DC4A4"/>
  <text x="34" y="54" class="ph" fill="#2DC4A4">explore</text>
  <text x="180" y="54" class="nm">OC Explorer</text>
  <text x="320" y="54" class="rl">Maps the codebase via the knowledge graph</text>

  <rect x="20" y="62" width="3" height="22" rx="1.5" fill="#35ADE5"/>
  <text x="34" y="78" class="ph" fill="#35ADE5">propose · spec · tasks</text>
  <text x="180" y="78" class="nm">OC Orchestrator</text>
  <text x="320" y="78" class="rl">Thin coordinator: plans, delegates, gates</text>

  <rect x="20" y="86" width="3" height="22" rx="1.5" fill="#8A6BBF"/>
  <text x="34" y="102" class="ph" fill="#8A6BBF">design</text>
  <text x="180" y="102" class="nm">OC Architect</text>
  <text x="320" y="102" class="rl">Architecture, components, data flow</text>

  <rect x="20" y="110" width="3" height="22" rx="1.5" fill="#2DC4A4"/>
  <text x="34" y="126" class="ph" fill="#2DC4A4">apply</text>
  <text x="180" y="126" class="nm">OC Builder</text>
  <text x="320" y="126" class="rl">Writes code matching existing patterns</text>

  <rect x="20" y="134" width="3" height="22" rx="1.5" fill="#35ADE5"/>
  <text x="34" y="150" class="ph" fill="#35ADE5">test</text>
  <text x="180" y="150" class="nm">OC Tester</text>
  <text x="320" y="150" class="rl">Behavior tests that fail when code breaks</text>

  <rect x="20" y="158" width="3" height="22" rx="1.5" fill="#8A6BBF"/>
  <text x="34" y="174" class="ph" fill="#8A6BBF">verify · review</text>
  <text x="180" y="174" class="nm">OC Reviewer</text>
  <text x="320" y="174" class="rl">Code review, quality gates, adversarial review</text>

  <rect x="20" y="182" width="3" height="22" rx="1.5" fill="#606978"/>
  <text x="34" y="198" class="ph" fill="#606978">teaching</text>
  <text x="180" y="198" class="nm">OC Professor</text>
  <text x="320" y="198" class="rl">Explains the why before the code</text>
</svg>
